name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  verify-release:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'master'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify release tag matches package version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          expected_tag = f"v{version}"

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"EXPECTED_TAG={expected_tag}\n")
          PY
          gh release view "$EXPECTED_TAG" --json tagName >/dev/null

  build-sdist:
    needs: verify-release
    if: always() && needs.verify-release.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build source distribution
        run: python -m build --sdist

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*

  build-wheel:
    needs: verify-release
    if: always() && needs.verify-release.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            bundle: linux_x86_64
          - runner: ubuntu-24.04-arm
            bundle: linux_aarch64
          - runner: macos-13
            bundle: macos_x86_64
          - runner: macos-14
            bundle: macos_arm64
          - runner: windows-latest
            bundle: win_amd64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Stage bundled RTK binary
        run: python src/pbi_agent/rtk_vendor.py --bundle "${{ matrix.bundle }}"

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.bundle }}
          path: dist/*

  publish:
    needs:
      - build-sdist
      - build-wheel
    if: >-
      ${{
        always() &&
        needs.build-sdist.result == 'success' &&
        needs.build-wheel.result == 'success'
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: Install publish dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
