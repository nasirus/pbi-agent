<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PBI Agent</title>
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="stylesheet" href="{{ config.static.url }}css/xterm.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    />
    <script src="{{ config.static.url }}js/textual.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0f1a;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        color: #e2e8f0;
        overflow: hidden;
      }

      /* ---- Ambient background ---- */
      .bg-gradient {
        position: fixed;
        inset: 0;
        background: radial-gradient(
              ellipse 80% 50% at 50% -10%,
              rgba(242, 200, 17, 0.07) 0%,
              transparent 60%
            ),
          radial-gradient(
            ellipse 50% 40% at 85% 100%,
            rgba(242, 200, 17, 0.04) 0%,
            transparent 50%
          ),
          linear-gradient(180deg, #0a0f1a 0%, #0d1525 50%, #0a0f1a 100%);
        z-index: 0;
      }

      .bg-grid {
        position: fixed;
        inset: 0;
        background-image: linear-gradient(
            rgba(242, 200, 17, 0.025) 1px,
            transparent 1px
          ),
          linear-gradient(
            90deg,
            rgba(242, 200, 17, 0.025) 1px,
            transparent 1px
          );
        background-size: 64px 64px;
        z-index: 1;
      }

      /* ---- Shared dialog layout ---- */
      .dialog-container {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }

      /* ---- Card ---- */
      .card {
        position: relative;
        width: 400px;
        padding: 48px 40px 40px;
        background: rgba(13, 21, 37, 0.85);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        border: 1px solid rgba(242, 200, 17, 0.12);
        border-radius: 24px;
        text-align: center;
        box-shadow: 0 0 0 1px rgba(242, 200, 17, 0.04),
          0 32px 64px -16px rgba(0, 0, 0, 0.6),
          0 0 120px -40px rgba(242, 200, 17, 0.08);
        z-index: 20;
      }

      /* ---- Logo ---- */
      .logo-wrap {
        margin-bottom: 28px;
        display: flex;
        justify-content: center;
      }

      .logo {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        object-fit: cover;
        border: 2px solid rgba(242, 200, 17, 0.25);
        box-shadow: 0 0 24px rgba(242, 200, 17, 0.12);
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
      }

      .intro-dialog .logo {
        animation: breathe 3s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          box-shadow: 0 0 24px rgba(242, 200, 17, 0.12);
          border-color: rgba(242, 200, 17, 0.25);
        }
        50% {
          box-shadow: 0 0 48px rgba(242, 200, 17, 0.25);
          border-color: rgba(242, 200, 17, 0.45);
        }
      }

      /* ---- Typography ---- */
      .brand-name {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #f2c811;
        margin-bottom: 6px;
      }

      .tagline {
        font-size: 13px;
        font-weight: 400;
        color: rgba(226, 232, 240, 0.5);
        margin-bottom: 36px;
      }

      /* ---- Loading indicator ---- */
      .loader {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        height: 40px;
      }

      .loader-dots {
        display: flex;
        gap: 7px;
      }

      .loader-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #f2c811;
        opacity: 0.25;
        animation: pulse 1.4s ease-in-out infinite;
      }
      .loader-dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loader-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.25;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.3);
        }
      }

      .loader-text {
        font-size: 13px;
        font-weight: 500;
        color: rgba(226, 232, 240, 0.4);
        letter-spacing: 0.5px;
      }

      /* ---- Ended state ---- */
      .ended-icon {
        width: 52px;
        height: 52px;
        margin: 0 auto 20px;
        border-radius: 50%;
        background: rgba(242, 200, 17, 0.08);
        border: 1px solid rgba(242, 200, 17, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .ended-icon svg {
        width: 22px;
        height: 22px;
        color: #f2c811;
      }

      .ended-title {
        font-size: 18px;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 6px;
      }

      .ended-subtitle {
        font-size: 13px;
        color: rgba(226, 232, 240, 0.45);
        margin-bottom: 32px;
      }

      /* ---- Buttons ---- */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px 36px;
        background: #f2c811;
        color: #0a0f1a;
        border: none;
        border-radius: 12px;
        font-family: "Inter", sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .btn:hover {
        background: #f5d442;
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(242, 200, 17, 0.3);
      }

      .btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(242, 200, 17, 0.2);
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* ---- Visibility states ---- */
      .intro-dialog {
        opacity: 1;
        transition: opacity 0.4s ease-out;
      }

      body.-first-byte .intro-dialog {
        opacity: 0;
        pointer-events: none;
      }

      .textual-terminal {
        opacity: 0;
        transition: opacity 0.4s ease-out;
      }

      body.-first-byte .textual-terminal {
        opacity: 1;
      }

      .closed-dialog {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease-out;
      }

      body.-closed .closed-dialog {
        opacity: 1;
        pointer-events: auto;
      }

      /* ---- Delay-start button ---- */
      #start {
        display: none;
      }

      #start.-delay {
        display: inline-flex;
      }

      /* ---- Footer ---- */
      .footer-text {
        font-size: 11px;
        font-family: "Roboto Mono", monospace;
        color: rgba(226, 232, 240, 0.2);
        margin-top: 24px;
        letter-spacing: 0.5px;
      }
    </style>
    <script>
      function getStartUrl() {
        const url = new URL(window.location.href);
        const params = new URLSearchParams(url.search);
        params.delete("delay");
        return url.pathname + "?" + params.toString();
      }
      async function refresh() {
        const ping_url = document.body.dataset.pingurl;
        if (ping_url) {
          await fetch(ping_url, {
            method: "GET",
            mode: "no-cors",
          });
        }
        window.location.href = getStartUrl();
      }

      function installTerminalInputBridges() {
        const NATIVE_WEBSOCKET = window.WebSocket;
        const MODIFIER_ENTER_SEQUENCES = new Map([
          ["shift", "\u001b[13;2u"],
          ["alt", "\u001b[13;3u"],
          ["alt+shift", "\u001b[13;4u"],
          ["ctrl", "\u001b[13;5u"],
          ["ctrl+shift", "\u001b[13;6u"],
          ["alt+ctrl", "\u001b[13;7u"],
          ["alt+ctrl+shift", "\u001b[13;8u"],
        ]);
        let appSocket = null;

        function websocketTargetsApp(url) {
          if (typeof url !== "string") {
            return false;
          }
          return url.includes("/ws");
        }

        function WrappedWebSocket(...args) {
          const socket = new NATIVE_WEBSOCKET(...args);
          if (websocketTargetsApp(args[0])) {
            appSocket = socket;
          }
          return socket;
        }

        WrappedWebSocket.prototype = NATIVE_WEBSOCKET.prototype;
        Object.setPrototypeOf(WrappedWebSocket, NATIVE_WEBSOCKET);
        for (const name of ["CONNECTING", "OPEN", "CLOSING", "CLOSED"]) {
          WrappedWebSocket[name] = NATIVE_WEBSOCKET[name];
        }
        window.WebSocket = WrappedWebSocket;

        function getModifierKey(event) {
          const modifiers = [];
          if (event.altKey) {
            modifiers.push("alt");
          }
          if (event.ctrlKey) {
            modifiers.push("ctrl");
          }
          if (event.shiftKey) {
            modifiers.push("shift");
          }
          return modifiers.join("+");
        }

        function terminalOwnsFocus() {
          const active = document.activeElement;
          if (!(active instanceof Element)) {
            return false;
          }
          return (
            active.classList.contains("xterm-helper-textarea") ||
            active.closest(".textual-terminal") !== null
          );
        }

        function appSocketReady() {
          return (
            appSocket !== null &&
            appSocket.readyState === NATIVE_WEBSOCKET.OPEN
          );
        }

        function sendTerminalInput(text) {
          if (!text || !appSocketReady()) {
            return false;
          }
          appSocket.send(JSON.stringify(["stdin", text]));
          return true;
        }

        function sendTerminalPaste(text) {
          if (!text || !appSocketReady()) {
            return false;
          }
          appSocket.send(JSON.stringify(["paste", text]));
          return true;
        }

        async function pasteClipboardText() {
          if (
            !terminalOwnsFocus() ||
            !appSocketReady() ||
            !navigator.clipboard ||
            typeof navigator.clipboard.readText !== "function"
          ) {
            return false;
          }
          try {
            const text = await navigator.clipboard.readText();
            return sendTerminalPaste(text);
          } catch (_error) {
            return false;
          }
        }

        document.addEventListener(
          "keydown",
          (event) => {
            if (event.key === "v" || event.key === "V") {
              if (
                !event.altKey &&
                (event.ctrlKey || event.metaKey) &&
                !event.shiftKey &&
                terminalOwnsFocus()
              ) {
                event.preventDefault();
                event.stopPropagation();
                if (typeof event.stopImmediatePropagation === "function") {
                  event.stopImmediatePropagation();
                }
                void pasteClipboardText();
              }
              return;
            }

            if (event.key !== "Enter" || event.metaKey) {
              return;
            }
            const modifierKey = getModifierKey(event);
            if (!modifierKey) {
              return;
            }
            const sequence = MODIFIER_ENTER_SEQUENCES.get(modifierKey);
            if (!sequence || !terminalOwnsFocus()) {
              return;
            }
            if (!appSocketReady()) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === "function") {
              event.stopImmediatePropagation();
            }
            sendTerminalInput(sequence);
          },
          true
        );

        document.addEventListener(
          "paste",
          (event) => {
            if (!terminalOwnsFocus()) {
              return;
            }
            const text = event.clipboardData?.getData("text/plain") ?? "";
            if (!text || !appSocketReady()) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            if (typeof event.stopImmediatePropagation === "function") {
              event.stopImmediatePropagation();
            }
            sendTerminalPaste(text);
          },
          true
        );
      }

      installTerminalInputBridges();
    </script>
  </head>
  <body data-pingurl="{{ ping_url }}">
    <!-- Ambient background -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- Intro / Loading dialog -->
    <div class="dialog-container intro-dialog">
      <div class="card">
        <div class="logo-wrap">
          <img src="/logo.png" alt="PBI Agent" class="logo" />
        </div>
        <div class="brand-name">PBI AGENT</div>
        <div class="tagline">Transform data into decisions.</div>
        <div class="loader">
          <div class="loader-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <span class="loader-text">Starting session</span>
        </div>
        <button type="button" onclick="refresh()" id="start" class="btn">
          Start
        </button>
        <div class="footer-text">{{ application.name or '' }}</div>
      </div>
    </div>

    <!-- Session ended dialog -->
    <div class="dialog-container closed-dialog">
      <div class="card">
        <div class="ended-icon">
          <!-- Pause/stop icon -->
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="10" y1="15" x2="10" y2="9" />
            <line x1="14" y1="15" x2="14" y2="9" />
          </svg>
        </div>
        <div class="ended-title">Session ended</div>
        <div class="ended-subtitle">
          Your workspace is ready for a new session.
        </div>
        <button type="button" onclick="refresh()" class="btn">
          <!-- Refresh icon -->
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
          </svg>
          Restart
        </button>
      </div>
    </div>

    <!-- Textual terminal -->
    <div
      id="terminal"
      class="textual-terminal"
      data-session-websocket-url="{{ app_websocket_url }}"
      data-font-size="{{ font_size }}"
    ></div>
  </body>
</html>
